<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work Hub — offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #fdf6f0 0%, #f7ede9 100%);
        font-family: 'Jost', system-ui, sans-serif;
        color: #5a4049;
        padding: 24px;
      }
      .card {
        background: #fffaf6;
        border-radius: 24px;
        padding: 40px 36px;
        max-width: 360px;
        text-align: center;
        box-shadow: 0 12px 40px rgba(120, 80, 90, 0.12);
      }
      .bud { font-size: 32px; margin-bottom: 8px; }
      h1 {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-style: italic;
        font-weight: 600;
        font-size: 28px;
        margin: 0 0 8px;
      }
      p { font-size: 14px; line-height: 1.6; color: rgba(90, 64, 73, 0.7); margin: 0; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="bud">🌹</div>
      <h1>Work Hub is offline</h1>
      <p>Your data is safe — it lives on this device. Reconnect when you can and everything will be right where you left it.</p>
    </div>
  </body>
</html>
